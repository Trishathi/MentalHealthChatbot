name: Run Gemini Script
on: [push] # This runs the code every time you push to GitHub

jobs:
  run-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install google-generativeai

      - name: Execute Script
        env:
          # This is the "bridge" between GitHub Secrets and your Python code
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
        run: python app_streamlit.py  # Change this to your actual filename
